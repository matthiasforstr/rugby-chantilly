<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#014421"/>
      <stop offset="60%" stop-color="#003220"/>
      <stop offset="100%" stop-color="#001810"/>
    </linearGradient>
    <pattern id="lines" width="80" height="80" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
      <rect width="80" height="80" fill="transparent"/>
      <line x1="0" y1="0" x2="0" y2="80" stroke="#b6171e" stroke-width="1" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#grad)"/>
  <rect width="1920" height="1080" fill="url(#lines)"/>
  <g opacity="0.06" fill="#ffffff">
    <ellipse cx="1400" cy="540" rx="360" ry="180" transform="rotate(-15 1400 540)"/>
    <ellipse cx="1400" cy="540" rx="280" ry="140" fill="none" stroke="#ffffff" stroke-width="3" transform="rotate(-15 1400 540)"/>
  </g>
  <text x="50%" y="50%" font-family="Impact, sans-serif" font-size="42" fill="#ffffff" opacity="0.15" text-anchor="middle" dominant-baseline="middle" letter-spacing="0.2em">PLACEHOLDER — REPLACE WITH CLUB PHOTO</text>
</svg>
